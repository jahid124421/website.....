:root {

  --accent-amber: #FFB800;
  --accent-red: #FF4757;
  --accent-purple: #9D4EDD;
  --text-primary: #F0F4FF;
  --text-secondary: #8B9CC8;
  --text-muted: #4A5578;
  --text-score: #FFFFFF;
}

.light-mode {
  --bg-base: #F0F4FF;
  --bg-card: #FFFFFF;
  --bg-elevated: #E8ECF4;
  --bg-glass: rgba(255, 255, 255, 0.8);
  --border-subtle: rgba(0,0,0,0.08);
  --border-glow: rgba(0, 150, 200, 0.3);
  --text-primary: #0D1526;
  --text-secondary: #4A5578;
  --text-muted: #8B9CC8;
  --text-score: #060B18;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}

.font-display { font-family: 'Space Grotesk', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }

.bg-grid {
  background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 24px 24px;
}

.glass-card {
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-subtle);
  transition: all 0.15s ease;
}
.glass-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-2px);
}

.gradient-text {
  background: linear-gradient(135deg, #00D4FF, #9D4EDD);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@keyframes pulse-live {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 135, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(0, 255, 135, 0); }
}
@keyframes score-pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); color: #00FF87; }
  100% { transform: scale(1); }
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes slide-in { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

.animate-fade-up { animation: fade-up 0.5s ease forwards; }
.animate-score-pop { animation: score-pop 0.6s ease; }
.animate-pulse-live { animation: pulse-live 2s infinite; }
.ticker-animate { animation: ticker-scroll 30s linear infinite; }

.stat-bar-fill { transition: width 0.8s ease; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>

// ==================== STATE MANAGEMENT ====================
const initialState = {
  currentPage: 'home',
  selectedMatchId: null,
  selectedLeagueId: null,
  selectedTeamId: null,
  selectedPlayerId: null,
  activeSport: 'football',
  activeDate: 'today',
  activeMatchTab: 'summary',
  activeLeagueTab: 'standings',
  searchQuery: '',
  favorites: [],
  darkMode: true,
  expandedLeagues: {},
};

function reducer(state, action) {
  switch(action.type) {
    case 'SET_PAGE': return {...state, currentPage: action.page};
    case 'VIEW_MATCH': return {...state, currentPage:'match', selectedMatchId:action.id, activeMatchTab:'summary'};
    case 'VIEW_LEAGUE': return {...state, currentPage:'league', selectedLeagueId:action.id, activeLeagueTab:'standings'};
    case 'VIEW_TEAM': return {...state, currentPage:'team', selectedTeamId:action.id};
    case 'VIEW_PLAYER': return {...state, currentPage:'player', selectedPlayerId:action.id};
    case 'SET_SPORT': return {...state, activeSport: action.sport};
    case 'SET_DATE': return {...state, activeDate: action.date};
    case 'SET_MATCH_TAB': return {...state, activeMatchTab: action.tab};
    case 'SET_LEAGUE_TAB': return {...state, activeLeagueTab: action.tab};
    case 'SET_SEARCH': return {...state, searchQuery: action.query, currentPage: action.query ? 'search' : 'home'};
    case 'TOGGLE_DARK': return {...state, darkMode: !state.darkMode};
    case 'TOGGLE_FAV': {
      const favs = state.favorites.includes(action.id) ? state.favorites.filter(f=>f!==action.id) : [...state.favorites, action.id];
      return {...state, favorites: favs};
    }
    case 'TOGGLE_LEAGUE': return {...state, expandedLeagues:{...state.expandedLeagues, [action.id]: !state.expandedLeagues[action.id]}};
    case 'GO_HOME': return {...state, currentPage:'home', searchQuery:''};
    default: return state;
  }
}

const TeamLogo = ({team, size='md'}) => {
  const sizes = {sm:'w-6 h-6 text-xs',md:'w-9 h-9 text-sm',lg:'w-13 h-13 text-lg',xl:'w-20 h-20 text-2xl'};
  const short = (team?.shortName || team?.name?.substring(0,3) || '???').substring(0,3);
  return (
    <div className={`${sizes[size]} rounded-full flex items-center justify-center font-display font-bold shrink-0`}
      style={{background:`${team?.color || '#333'}22`, border:`2px solid ${team?.color || '#333'}`, color:team?.color || '#fff'}}>
      {short}
    </div>
  );
};

const StatusBadge = ({status, minute, quarter}) => {
  if(status === 'LIVE') return (
    <div className="flex items-center gap-1.5">
      <span className="w-2 h-2 rounded-full animate-pulse-live" style={{background:'var(--accent-green)'}}></span>
      <span className="font-mono text-xs font-medium" style={{color:'var(--accent-green)'}}>{quarter || `${minute}'`}</span>
    </div>
  );
  const colors = {FT:'var(--text-muted)',HT:'var(--accent-amber)',NS:'var(--accent-cyan)',PPD:'var(--text-muted)'};
  return <span className="font-mono text-xs font-medium" style={{color:colors[status]||'var(--text-muted)'}}>{status}</span>;
};

const PlayerRatingBadge = ({rating}) => {
  const color = rating >= 8 ? 'var(--accent-green)' : rating >= 7 ? 'var(--accent-cyan)' : rating >= 6 ? 'var(--text-secondary)' : 'var(--accent-red)';
  return <span className="font-mono text-xs px-1.5 py-0.5 rounded" style={{background:`${color}22`,color,border:`1px solid ${color}44`}}>{rating.toFixed(1)}</span>;
};

const FormDots = ({form}) => (
  <div className="flex gap-1">{(form||[]).map((r,i) => (
    <span key={i} className="w-4 h-4 rounded-full text-[9px] flex items-center justify-center font-bold text-white"
      style={{background: r==='W'?'var(--accent-green)':r==='D'?'var(--text-muted)':'var(--accent-red)', animationDelay:`${i*50}ms`}}>{r}</span>
  ))}</div>
);

const StatBar = ({label, home, away, homeColor, awayColor}) => {
  const total = home + away || 1;
  const hp = (home/total)*100;
  const [animated, setAnimated] = useState(false);
  useEffect(()=>{const t=setTimeout(()=>setAnimated(true),100);return()=>clearTimeout(t);},[]);
  return (
    <div className="flex items-center gap-3 py-2">

const PitchFormation = ({match}) => {
  const positionMap = {
    GK: {top:'88%'}, RB:{top:'70%',left:'85%'}, CB:{top:'70%'}, LB:{top:'70%',left:'15%'},
    CM:{top:'48%'}, CDM:{top:'58%'}, CAM:{top:'38%'}, RM:{top:'48%',left:'85%'}, LM:{top:'48%',left:'15%'},
    RW:{top:'25%',left:'85%'}, LW:{top:'25%',left:'15%'}, ST:{top:'15%'}, CF:{top:'20%'},
  };
  const getPositions = (players) => {
    const byPos = {};
    players.forEach(p => { if(!byPos[p.position]) byPos[p.position]=[]; byPos[p.position].push(p); });
    const result = [];
    Object.entries(byPos).forEach(([pos, pls]) => {
      const base = positionMap[pos] || {top:'50%'};
      pls.forEach((p, i) => {
        const spread = pls.length > 1 ? (i / (pls.length - 1)) * 60 + 20 : 50;
        result.push({...p, style: {top: base.top, left: base.left || `${spread}%`}});
      });
    });
    return result;
  };
  return (
    <div className="py-4">
      <div className="text-center text-sm mb-4" style={{color:'var(--text-secondary)'}}>
        {match.lineups?.home?.formation || '4-3-3'} vs {match.lineups?.away?.formation || '4-3-3'}
      </div>
      <div className="relative rounded-xl overflow-hidden" style={{background:'#1a3d2b',height:'400px',border:'2px solid rgba(255,255,255,0.2)'}}>
        <div className="absolute inset-0" style={{background:'repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.08) 49px, rgba(255,255,255,0.08) 50px)'}}></div>
        <div className="absolute top-1/2 left-0 right-0 h-px" style={{background:'rgba(255,255,255,0.2)'}}></div>
        <div className="absolute top-1/2 left-1/2 w-20 h-20 rounded-full -translate-x-1/2 -translate-y-1/2" style={{border:'1px solid rgba(255,255,255,0.2)'}}></div>
        {/* Home team - bottom half */}
        {match.lineups?.home?.players?.map((p, i) => {
          const positions = getPositions(match.lineups.home.players);
          const pp = positions[i];
          if(!pp) return null;
          return (
            <div key={`h${i}`} className="absolute flex flex-col items-center" style={{top:`${50 + parseFloat(pp.style.top)/2}%`, left:pp.style.left, transform:'translate(-50%,-50%)'}}>
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background:match.homeTeam.color}}>{p.number}</div>
              <span className="text-[9px] mt-0.5 text-white font-medium whitespace-nowrap">{p.name.split(' ').pop()}</span>
              <PlayerRatingBadge rating={p.rating} />
            </div>
          );
        })}
        {/* Away team - top half */}
        {match.lineups?.away?.players?.map((p, i) => {
          const positions = getPositions(match.lineups.away.players);
          const pp = positions[i];
          if(!pp) return null;
          return (
            <div key={`a${i}`} className="absolute flex flex-col items-center" style={{top:`${parseFloat(pp.style.top)/2}%`, left:pp.style.left, transform:'translate(-50%,-50%)'}}>
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background:match.awayTeam.color}}>{p.number}</div>
              <span className="text-[9px] mt-0.5 text-white font-medium whitespace-nowrap">{p.name.split(' ').pop()}</span>
              <PlayerRatingBadge rating={p.rating} />
            </div>
          );
        })}
      </div>
    </div>
  );
};

const H2HTab = ({match}) => {
  const h2h = match.h2h || [];
  if(!h2h.length) return <div className="py-8 text-center text-sm" style={{color:'var(--text-muted)'}}>No head-to-head data available</div>;
  const wins = {home:0,away:0,draw:0};
  h2h.forEach(m => { if(m.result==='H') wins.home++; else if(m.result==='A') wins.away++; else wins.draw++; });
  return (
    <div className="py-4">
      <div className="flex justify-center gap-6 mb-6">
        <div className="text-center"><div className="font-display font-bold text-2xl" style={{color:match.homeTeam.color}}>{wins.home}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>Wins</div></div>
        <div className="text-center"><div className="font-display font-bold text-2xl" style={{color:'var(--text-muted)'}}>{wins.draw}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>Draws</div></div>
        <div className="text-center"><div className="font-display font-bold text-2xl" style={{color:match.awayTeam.color}}>{wins.away}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>Wins</div></div>
      </div>
      {h2h.map((m,i) => (
        <div key={i} className="glass-card rounded-lg p-3 mb-2 flex items-center justify-between">
          <span className="text-xs" style={{color:'var(--text-muted)'}}>{m.date}</span>
          <span className="text-sm font-medium" style={{color:'var(--text-primary)'}}>{m.home} {m.score} {m.away}</span>
          <span className="text-xs px-2 py-0.5 rounded font-bold" style={{background:m.result==='H'?'var(--accent-green)22':m.result==='A'?'var(--accent-red)22':'var(--text-muted)22',color:m.result==='H'?'var(--accent-green)':m.result==='A'?'var(--accent-red)':'var(--text-muted)'}}>{m.result}</span>
        </div>
      ))}
    </div>
  );
};

const StandingsTab = ({match, leagueId}) => {
  const cid = leagueId || match?.competition?.id;
  if(cid !== 'epl') return <div className="py-8 text-center text-sm" style={{color:'var(--text-muted)'}}>Standings available for Premier League</div>;
  const {dispatch} = useContext(AppContext);
  return (
    <div className="py-4 overflow-x-auto">
      <table className="w-full text-xs">
        <thead><tr style={{color:'var(--text-muted)',borderBottom:'1px solid var(--border-subtle)'}}>
          <th className="text-left py-2 px-1 w-8">#</th><th className="text-left py-2">Team</th>
          <th className="text-center py-2 w-8">P</th><th className="text-center py-2 w-8">W</th>
          <th className="text-center py-2 w-8">D</th><th className="text-center py-2 w-8">L</th>
          <th className="text-center py-2 w-8">GD</th><th className="text-center py-2 w-10 font-bold">Pts</th>
          <th className="text-center py-2 hidden md:table-cell">Form</th>
        </tr></thead>
        <tbody>{EPL_TABLE.map(row => {
          const isPlaying = match && (row.team === match.homeTeam?.name || row.team === match.awayTeam?.name);
          const teamData = TEAMS[row.id];
          const borderColor = isPlaying ? (row.team===match?.homeTeam?.name?match.homeTeam.color:match?.awayTeam?.color) : row.pos<=4?'#00D4FF33':row.pos>=18?'#FF475733':'transparent';
          return (
            <tr key={row.pos} className="cursor-pointer transition-colors" style={{borderLeft:`3px solid ${borderColor}`,background:isPlaying?'var(--bg-elevated)':'transparent'}}
              onClick={()=>teamData&&dispatch({type:'VIEW_TEAM',id:row.id})}>
              <td className="py-2 px-1 font-mono" style={{color:'var(--text-muted)'}}>{row.pos}</td>
              <td className="py-2 font-medium" style={{color:'var(--text-primary)'}}>{row.team}</td>
              <td className="text-center py-2" style={{color:'var(--text-secondary)'}}>{row.played}</td>
              <td className="text-center py-2" style={{color:'var(--text-secondary)'}}>{row.won}</td>
              <td className="text-center py-2" style={{color:'var(--text-secondary)'}}>{row.drawn}</td>
              <td className="text-center py-2" style={{color:'var(--text-secondary)'}}>{row.lost}</td>
              <td className="text-center py-2 font-mono" style={{color:row.gd>0?'var(--accent-green)':row.gd<0?'var(--accent-red)':'var(--text-muted)'}}>{row.gd>0?'+':''}{row.gd}</td>
              <td className="text-center py-2 font-display font-bold" style={{color:'var(--text-primary)'}}>{row.pts}</td>
              <td className="text-center py-2 hidden md:table-cell"><FormDots form={row.form} /></td>
            </tr>
          );
        })}</tbody>
      </table>
    </div>
  );
};

const MatchDetailPage = () => {
  const {state, dispatch} = useContext(AppContext);
  const match = MATCHES.find(m => m.id === state.selectedMatchId);
  if(!match) return <div className="p-8 text-center" style={{color:'var(--text-muted)'}}>Match not found</div>;
  const tabs = ['summary','stats','lineups','h2h','standings'];
  return (
    <div className="max-w-4xl mx-auto px-4 py-4 animate-fade-up">
      <button onClick={()=>dispatch({type:'GO_HOME'})} className="text-sm mb-4 cursor-pointer flex items-center gap-1" style={{color:'var(--accent-cyan)'}}>← Back</button>
      {/* Match Header */}
      <div className="rounded-2xl p-6 mb-4 relative overflow-hidden" style={{background:`radial-gradient(circle at 25% 50%, ${match.homeTeam.color}22, transparent 60%), radial-gradient(circle at 75% 50%, ${match.awayTeam.color}22, transparent 60%), var(--bg-card)`,border:'1px solid var(--border-subtle)',minHeight:'200px'}}>
        <div className="text-center mb-2">
          <span className="text-xs" style={{color:'var(--text-muted)'}}>{match.competition.logo} {match.competition.name}</span>
        </div>
        <div className="flex items-center justify-between">
          <div className="text-center flex-1 cursor-pointer" onClick={()=>dispatch({type:'VIEW_TEAM',id:match.homeTeam.id})}>
            <TeamLogo team={match.homeTeam} size="xl" />
            <div className="font-display font-bold text-lg mt-2" style={{color:'var(--text-primary)',textShadow:`0 0 20px ${match.homeTeam.color}44`}}>{match.homeTeam.name}</div>
          </div>
          <div className="text-center px-4">
            <div className="font-display font-extrabold text-6xl md:text-7xl" style={{color:'var(--text-score)'}}>{match.homeScore} - {match.awayScore}</div>
            <StatusBadge status={match.status} minute={match.minute} quarter={match.quarter} />
            {match.status === 'LIVE' && (
              <div className="w-32 h-1 rounded-full mt-2 mx-auto" style={{background:'var(--bg-elevated)'}}>
                <div className="h-full rounded-full" style={{width:`${(match.minute/90)*100}%`,background:'var(--accent-green)'}}></div>
              </div>
            )}
          </div>
          <div className="text-center flex-1 cursor-pointer" onClick={()=>dispatch({type:'VIEW_TEAM',id:match.awayTeam.id})}>
            <TeamLogo team={match.awayTeam} size="xl" />
            <div className="font-display font-bold text-lg mt-2" style={{color:'var(--text-primary)',textShadow:`0 0 20px ${match.awayTeam.color}44`}}>{match.awayTeam.name}</div>
          </div>
        </div>
        <div className="text-center mt-3 text-xs" style={{color:'var(--text-muted)'}}>{match.venue} · {match.date} · {match.time}</div>
      </div>
      {/* Tabs */}
      <div className="flex gap-1 mb-4 overflow-x-auto hide-scrollbar" style={{borderBottom:'1px solid var(--border-subtle)'}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>dispatch({type:'SET_MATCH_TAB',tab:t})}
            className="px-4 py-2.5 text-sm font-medium capitalize cursor-pointer transition-all whitespace-nowrap"
            style={state.activeMatchTab===t?{color:'var(--accent-cyan)',borderBottom:'2px solid var(--accent-cyan)'}:{color:'var(--text-muted)'}}>{t}</button>
        ))}
      </div>
      {/* Tab Content */}
      {state.activeMatchTab === 'summary' && <><MatchTimeline match={match} /><MatchCommentary match={match} /></>}
      {state.activeMatchTab === 'stats' && <MatchStats match={match} />}
      {state.activeMatchTab === 'lineups' && <PitchFormation match={match} />}
      {state.activeMatchTab === 'h2h' && <H2HTab match={match} />}
      {state.activeMatchTab === 'standings' && <StandingsTab match={match} />}
    </div>
  );
};

// ==================== LEAGUE PAGE ====================
const LeaguePage = () => {
  const {state, dispatch} = useContext(AppContext);
  const league = COMPETITIONS[state.selectedLeagueId];
  if(!league) return <div className="p-8 text-center" style={{color:'var(--text-muted)'}}>League not found</div>;
  const leagueMatches = MATCHES.filter(m => m.competition.id === league.id);
  const tabs = ['standings','fixtures','results','top scorers'];
  return (
    <div className="max-w-4xl mx-auto px-4 py-4 animate-fade-up">
      <button onClick={()=>dispatch({type:'GO_HOME'})} className="text-sm mb-4 cursor-pointer flex items-center gap-1" style={{color:'var(--accent-cyan)'}}>← Back</button>
      <div className="rounded-2xl p-6 mb-6" style={{background:`linear-gradient(135deg, ${league.color}44, var(--bg-card))`,border:'1px solid var(--border-subtle)'}}>
        <div className="flex items-center gap-3">
          <span className="text-4xl">{league.logo}</span>
          <div>
            <h1 className="font-display font-bold text-2xl" style={{color:'var(--text-primary)'}}>{league.name}</h1>
            <span className="text-sm" style={{color:'var(--text-secondary)'}}>{league.country} · 2025/26 Season</span>
          </div>
        </div>
        <div className="flex gap-6 mt-4">
          {[['Teams','20'],['Matches',leagueMatches.length],['Goals',leagueMatches.reduce((a,m)=>a+m.homeScore+m.awayScore,0)]].map(([l,v])=>(
            <div key={l}><div className="font-display font-bold text-xl" style={{color:'var(--accent-cyan)'}}>{v}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{l}</div></div>
          ))}
        </div>
      </div>
      <div className="flex gap-1 mb-4 overflow-x-auto hide-scrollbar" style={{borderBottom:'1px solid var(--border-subtle)'}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>dispatch({type:'SET_LEAGUE_TAB',tab:t})}
            className="px-4 py-2.5 text-sm font-medium capitalize cursor-pointer transition-all whitespace-nowrap"
            style={state.activeLeagueTab===t?{color:'var(--accent-cyan)',borderBottom:'2px solid var(--accent-cyan)'}:{color:'var(--text-muted)'}}>{t}</button>
        ))}
      </div>
      {state.activeLeagueTab === 'standings' && <StandingsTab match={null} leagueId={league.id} />}
      {state.activeLeagueTab === 'fixtures' && (
        <div className="space-y-2">{leagueMatches.filter(m=>m.status==='NS').map(m=><MatchCard key={m.id} match={m} />)}
          {leagueMatches.filter(m=>m.status==='NS').length===0 && <div className="py-8 text-center text-sm" style={{color:'var(--text-muted)'}}>No upcoming fixtures</div>}
        </div>
      )}
      {state.activeLeagueTab === 'results' && (
        <div className="space-y-2">{leagueMatches.filter(m=>m.status==='FT').map(m=><MatchCard key={m.id} match={m} />)}</div>
      )}
      {state.activeLeagueTab === 'top scorers' && (
        <div className="py-4">{TOP_SCORERS.map(s=>(
          <div key={s.rank} className="flex items-center gap-3 py-3 px-3 rounded-lg mb-1 cursor-pointer" style={{background:s.rank===1?'var(--bg-elevated)':'transparent',borderLeft:s.rank===1?'3px solid var(--accent-amber)':'3px solid transparent'}}
            onClick={()=>{const pid=Object.keys(PLAYERS).find(k=>PLAYERS[k].name===s.player);if(pid)dispatch({type:'VIEW_PLAYER',id:pid});}}>
            <span className="font-mono text-sm w-6" style={{color:s.rank===1?'var(--accent-amber)':'var(--text-muted)'}}>{s.rank===1?'🏆':s.rank}</span>
            <div className="flex-1">
              <div className="text-sm font-medium" style={{color:'var(--text-primary)'}}>{s.player}</div>
              <div className="text-xs" style={{color:'var(--text-muted)'}}>{s.team}</div>
            </div>
            <div className="text-right">
              <span className="font-display font-bold text-lg" style={{color:'var(--accent-cyan)'}}>{s.goals}</span>
              <span className="text-xs ml-2" style={{color:'var(--text-muted)'}}>{s.assists}A · {s.matches}M</span>
            </div>
          </div>
        ))}</div>
      )}
    </div>
  );
};

// ==================== TEAM PAGE ====================
const TeamPage = () => {
  const {state, dispatch} = useContext(AppContext);
  const team = TEAMS[state.selectedTeamId];
  if(!team) return <div className="p-8 text-center" style={{color:'var(--text-muted)'}}>Team not found</div>;
  const teamMatches = MATCHES.filter(m => m.homeTeam.id === team.id || m.awayTeam.id === team.id);
  const tableRow = EPL_TABLE.find(r => r.id === team.id);
  return (
    <div className="max-w-4xl mx-auto px-4 py-4 animate-fade-up">
      <button onClick={()=>dispatch({type:'GO_HOME'})} className="text-sm mb-4 cursor-pointer flex items-center gap-1" style={{color:'var(--accent-cyan)'}}>← Back</button>
      <div className="rounded-2xl p-6 mb-6" style={{background:`linear-gradient(135deg, ${team.color}22, var(--bg-card))`,border:'1px solid var(--border-subtle)'}}>
        <div className="flex items-center gap-4">
          <TeamLogo team={team} size="xl" />
          <div>
            <h1 className="font-display font-bold text-2xl" style={{color:'var(--text-primary)'}}>{team.name}</h1>
            <div className="text-sm" style={{color:'var(--text-secondary)'}}>{team.country} · {team.stadium}</div>
            <div className="text-xs" style={{color:'var(--text-muted)'}}>Founded {team.founded} · Manager: {team.manager}</div>
          </div>
        </div>
        {tableRow && (
          <div className="flex gap-6 mt-4">
            {[['Position',tableRow.pos],['Played',tableRow.played],['W/D/L',`${tableRow.won}/${tableRow.drawn}/${tableRow.lost}`],['GD',tableRow.gd>0?`+${tableRow.gd}`:tableRow.gd],['Points',tableRow.pts]].map(([l,v])=>(
              <div key={l}><div className="font-display font-bold text-lg" style={{color:'var(--accent-cyan)'}}>{v}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{l}</div></div>
            ))}
          </div>
        )}
      </div>
      {tableRow && (
        <div className="mb-6">
          <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-primary)'}}>Recent Form</h3>
          <div className="flex gap-2"><FormDots form={tableRow.form} /></div>
        </div>
      )}
      <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-primary)'}}>Matches</h3>
      <div className="space-y-2">{teamMatches.map(m=><MatchCard key={m.id} match={m} />)}</div>
      {teamMatches.length === 0 && <div className="py-8 text-center text-sm" style={{color:'var(--text-muted)'}}>No matches found</div>}
    </div>
  );
};

// ==================== PLAYER PAGE ====================
const PlayerPage = () => {
  const {state, dispatch} = useContext(AppContext);
  const player = PLAYERS[state.selectedPlayerId];
  if(!player) return <div className="p-8 text-center" style={{color:'var(--text-muted)'}}>Player not found</div>;
  const team = TEAMS[player.teamId];
  return (
    <div className="max-w-4xl mx-auto px-4 py-4 animate-fade-up">
      <button onClick={()=>dispatch({type:'GO_HOME'})} className="text-sm mb-4 cursor-pointer flex items-center gap-1" style={{color:'var(--accent-cyan)'}}>← Back</button>
      <div className="rounded-2xl p-6 mb-6" style={{background:`linear-gradient(135deg, ${team?.color||'#333'}22, var(--bg-card))`,border:'1px solid var(--border-subtle)'}}>
        <div className="flex items-center gap-4">
          <div className="w-20 h-20 rounded-full flex items-center justify-center font-display font-extrabold text-3xl" style={{background:`${team?.color||'#333'}33`,color:team?.color||'#fff',border:`3px solid ${team?.color||'#333'}`}}>{player.number}</div>
          <div>
            <h1 className="font-display font-bold text-2xl" style={{color:'var(--text-primary)'}}>{player.name}</h1>
            <div className="text-sm" style={{color:'var(--text-secondary)'}}>{player.nationality} {player.position} · {player.team}</div>
            <div className="text-xs" style={{color:'var(--text-muted)'}}>Age {player.age}</div>
          </div>
        </div>
        <div className="flex gap-6 mt-4">
          {[['Goals',player.stats.goals],['Assists',player.stats.assists],['Matches',player.stats.matches],['Avg Rating',player.stats.avgRating.toFixed(1)]].map(([l,v])=>(
            <div key={l}><div className="font-display font-bold text-xl" style={{color:'var(--accent-cyan)'}}>{v}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{l}</div></div>
          ))}
        </div>
      </div>
      {/* Radar-like stats */}
      <div className="glass-card rounded-xl p-4 mb-6">
        <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-primary)'}}>Attributes</h3>
        {['shooting','passing','dribbling','defending','pace','physical'].map(attr=>(
          <div key={attr} className="flex items-center gap-3 py-1.5">
            <span className="text-xs capitalize w-20" style={{color:'var(--text-secondary)'}}>{attr}</span>
            <div className="flex-1 h-2 rounded-full" style={{background:'var(--bg-elevated)'}}>
              <div className="h-full rounded-full transition-all duration-700" style={{width:`${player.stats[attr]}%`,background:player.stats[attr]>=80?'var(--accent-green)':player.stats[attr]>=60?'var(--accent-cyan)':'var(--accent-amber)'}}></div>
            </div>
            <span className="font-mono text-xs w-8" style={{color:'var(--text-primary)'}}>{player.stats[attr]}</span>
          </div>
        ))}
      </div>
      {/* Recent Matches */}
      <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-primary)'}}>Recent Matches</h3>
      <div className="space-y-2">
        {player.recentMatches?.map((m,i)=>(
          <div key={i} className="glass-card rounded-lg p-3 flex items-center justify-between">
            <div>
              <span className="text-sm font-medium" style={{color:'var(--text-primary)'}}>vs {m.vs}</span>
              <span className="text-xs ml-2" style={{color:'var(--text-muted)'}}>{m.score}</span>
            </div>
            <div className="flex items-center gap-2">
              {m.goals > 0 && <span className="text-xs">⚽×{m.goals}</span>}
              {m.assists > 0 && <span className="text-xs">🅰️×{m.assists}</span>}
              <PlayerRatingBadge rating={m.rating} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ==================== SEARCH PAGE ====================
const SearchPage = () => {
  const {state, dispatch} = useContext(AppContext);
  const q = state.searchQuery.toLowerCase();
  const matchResults = MATCHES.filter(m => m.homeTeam.name.toLowerCase().includes(q) || m.awayTeam.name.toLowerCase().includes(q));
  const teamResults = Object.values(TEAMS).filter(t => t.name.toLowerCase().includes(q));
  const playerResults = Object.values(PLAYERS).filter(p => p.name.toLowerCase().includes(q));
  const leagueResults = Object.values(COMPETITIONS).filter(c => c.name.toLowerCase().includes(q));
  const noResults = !matchResults.length && !teamResults.length && !playerResults.length && !leagueResults.length;
  return (
    <div className="max-w-4xl mx-auto px-4 py-4 animate-fade-up">
      <div className="mb-6">
        <input autoFocus className="w-full bg-transparent text-xl font-display font-bold outline-none py-3" style={{color:'var(--text-primary)',borderBottom:'2px solid var(--accent-cyan)'}}
          placeholder="Search teams, players, leagues..." value={state.searchQuery} onChange={e=>dispatch({type:'SET_SEARCH',query:e.target.value})} />
      </div>
      {noResults && q && <div className="py-12 text-center" style={{color:'var(--text-muted)'}}><div className="text-4xl mb-3">🔍</div>No results found for "{state.searchQuery}"</div>}
      {leagueResults.length > 0 && (
        <div className="mb-6">
          <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-secondary)'}}>Competitions</h3>
          {leagueResults.map(l=>(
            <div key={l.id} className="glass-card rounded-lg p-3 mb-2 flex items-center gap-3 cursor-pointer" onClick={()=>dispatch({type:'VIEW_LEAGUE',id:l.id})}>
              <span className="text-xl">{l.logo}</span>
              <div><div className="text-sm font-medium" style={{color:'var(--text-primary)'}}>{l.name}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{l.country}</div></div>
            </div>
          ))}
        </div>
      )}
      {teamResults.length > 0 && (
        <div className="mb-6">
          <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-secondary)'}}>Teams</h3>
          {teamResults.map(t=>(
            <div key={t.id} className="glass-card rounded-lg p-3 mb-2 flex items-center gap-3 cursor-pointer" onClick={()=>dispatch({type:'VIEW_TEAM',id:t.id})}>
              <TeamLogo team={t} size="sm" />
              <div><div className="text-sm font-medium" style={{color:'var(--text-primary)'}}>{t.name}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{t.country}</div></div>
            </div>
          ))}
        </div>
      )}
      {playerResults.length > 0 && (
        <div className="mb-6">
          <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-secondary)'}}>Players</h3>
          {playerResults.map(p=>(
            <div key={p.id} className="glass-card rounded-lg p-3 mb-2 flex items-center gap-3 cursor-pointer" onClick={()=>dispatch({type:'VIEW_PLAYER',id:p.id})}>
              <span className="text-xl">{p.nationality}</span>
              <div><div className="text-sm font-medium" style={{color:'var(--text-primary)'}}>{p.name}</div><div className="text-xs" style={{color:'var(--text-muted)'}}>{p.team} · {p.position}</div></div>
            </div>
          ))}
        </div>
      )}
      {matchResults.length > 0 && (
        <div className="mb-6">
          <h3 className="font-display font-bold text-sm mb-3" style={{color:'var(--text-secondary)'}}>Matches</h3>
          {matchResults.map(m=><MatchCard key={m.id} match={m} />)}
        </div>
      )}
    </div>
  );
};

// ==================== APP ====================
const App = () => {
  const [state, dispatch] = useReducer(reducer, initialState);
  return (
    <AppContext.Provider value={{state, dispatch}}>
      <div className={`min-h-screen bg-grid ${state.darkMode?'':'light-mode'}`} style={{background:'var(--bg-base)',color:'var(--text-primary)'}}>
        <LiveScoreTicker />
        <Navbar />
        {state.currentPage === 'home' && <><SportTabBar /><DateNavigator /><HomePage /></>}
        {state.currentPage === 'match' && <MatchDetailPage />}
        {state.currentPage === 'league' && <LeaguePage />}
        {state.currentPage === 'team' && <TeamPage />}
        {state.currentPage === 'player' && <PlayerPage />}
        {state.currentPage === 'search' && <SearchPage />}
      </div>
    </AppContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
